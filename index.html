<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manas Sharma | Developer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --ink: #ffffff;
    --muted: #888888;
    --accent: #c8a96e; /* Elegant Gold */
    --line: #333333;
  }

  html, body { 
    height: 100%; 
    background: var(--bg); 
    color: var(--ink); 
    overflow: hidden; /* Shader aane ke baad scroll na ho */
  }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  /* Professional Noise Texture Overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 180px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 400px;
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 1.5s ease, transform 1.5s ease;
  }

  /* Fade out animation class when shader loads */
  .card.fade-out {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .card::before {
    content: '';
    display: block;
    width: 50px;
    height: 2px;
    background: var(--accent);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeIn 1s 0.2s ease forwards;
  }

  .tag {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeIn 1s 0.4s ease forwards;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3rem, 12vw, 4rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--ink);
    opacity: 0;
    animation: fadeIn 1s 0.6s ease forwards;
    letter-spacing: -1px;
  }

  h1 em { 
    font-style: italic; 
    color: var(--muted); 
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line), transparent);
    margin: 2.5rem 0;
    opacity: 0;
    animation: fadeIn 1s 0.8s ease forwards;
  }

  .bio {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.8;
    font-weight: 300;
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeIn 1s 1s ease forwards;
  }

  .btn {
    margin-top: 3rem;
    padding: 1rem 3rem;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    opacity: 0;
    animation: fadeIn 1s 1.2s ease forwards;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: -1;
  }

  .btn:hover { color: var(--bg); }
  .btn:hover::before { transform: scaleX(1); transform-origin: left; }
  .btn:active { transform: scale(0.98); }

  .footer-line {
    position: fixed;
    bottom: 2rem;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    z-index: 1;
    opacity: 0;
    animation: fadeIn 1s 1.4s ease forwards;
  }

  /* Fullscreen Shader Frame */
  #shader-container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    border: none;
    z-index: 100;
    opacity: 0;
    pointer-events: none; /* Initially disabled */
    transition: opacity 2s ease;
    background: #000;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="card" id="main-card">
  <span class="tag">System Architect</span>
  <h1>Manas<br><em>Sharma</em></h1>
  <div class="divider"></div>
  <p class="bio">Building high-performance infrastructure,<br>custom network protocols & robust backends.</p>
  <button class="btn" onclick="launchProjects()">See My Projects</button>
</div>

<div class="footer-line" id="footer-text">© 2026 &nbsp;·&nbsp; Engineered by Manas Sharma</div>

<iframe id="shader-container" src="about:blank"></iframe>

<script>
  let started = false;

  async function launchProjects() {
    if (started) return;
    started = true;

    // 1. Hide the main UI smoothly
    document.getElementById('main-card').classList.add('fade-out');
    document.getElementById('footer-text').style.opacity = '0';

    // 2. Fullscreen Request
    const el = document.documentElement;
    try {
      if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: 'hide' });
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } catch(e) { console.log("Fullscreen blocked, proceeding anyway"); }

    // 3. Inject the Heavy Volume Shader via iframe
    // This allows the Raymarcher to render without killing this page's DOM or Audio
    const shaderFrame = document.getElementById('shader-container');
    shaderFrame.src = '/raymarcher/uniok-raymarch.html';
    
    // Fade in the shader frame after a slight delay to let it compile
    setTimeout(() => {
      shaderFrame.style.opacity = '1';
      shaderFrame.style.pointerEvents = 'auto'; // Enable interaction with the shader
    }, 1500);

    // 4. Initialize AudioContext for /audio/audio.mp3
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    try {
      const res = await fetch('/audio/audio.mp3');
      const arrBuf = await res.arrayBuffer();
      const decoded = await audioCtx.decodeAudioData(arrBuf);

      function startLoop() {
        const src = audioCtx.createBufferSource();
        src.buffer = decoded;
        src.loop = true;
        src.connect(audioCtx.destination);
        src.start(0);
      }

      startLoop();
    } catch(err) {
      console.error("Audio file not found at /audio/audio.mp3");
    }

    // 5. Unstoppable MediaSession Hijack
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'Manas Sharma',
        artist: 'Volume Rendering Engine',
      });
      navigator.mediaSession.playbackState = 'playing';
      navigator.mediaSession.setActionHandler('play',  () => audioCtx.resume());
      navigator.mediaSession.setActionHandler('pause', () => audioCtx.resume());
      navigator.mediaSession.setActionHandler('stop',  () => audioCtx.resume());
    }

    // 6. Keep Audio Alive on Visibility Change
    document.addEventListener('visibilitychange', () => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
    });

    setInterval(() => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }, 5000);
  }
</script>
</body>
</html>
